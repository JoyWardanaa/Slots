<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Joy Slots - Demo Slot Gacor</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c); font-family: 'Segoe UI', 'Arial', sans-serif; color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app { width: 100%; max-width: 1450px; padding: 20px; }
        .auth-box { background: rgba(0,0,0,0.7); backdrop-filter: blur(14px); border-radius: 48px; padding: 30px; max-width: 480px; margin: 40px auto; border: 1px solid #f0b90b; box-shadow: 0 20px 35px rgba(0,0,0,0.6); }
        .auth-box h2 { text-align: center; color: #f0b90b; margin-bottom: 24px; text-shadow: 0 0 5px #ff9800; }
        .input-group { margin-bottom: 18px; }
        .input-group input { width: 100%; padding: 14px 20px; background: #1e243b; border: none; border-radius: 60px; color: white; font-size: 16px; outline: none; border: 1px solid #2a334e; }
        .input-group input:focus { border-color: #f0b90b; }
        button { background: linear-gradient(135deg, #f0a500, #c97e00); border: none; padding: 12px 24px; border-radius: 60px; font-weight: bold; font-size: 18px; color: #1a1f2e; cursor: pointer; width: 100%; margin-top: 8px; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .switch-text { text-align: center; margin-top: 20px; color: #aaa; cursor: pointer; }
        .dashboard { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0f1422cc; border-radius: 60px; padding: 10px 24px; margin-bottom: 30px; backdrop-filter: blur(8px); flex-wrap: wrap; gap: 10px; }
        .balance { background: #00000066; padding: 8px 22px; border-radius: 40px; font-weight: bold; color: #f0b90b; font-size: 1.5rem; }
        .admin-badge { background: #8b0000; padding: 5px 15px; border-radius: 30px; font-size: 12px; }
        .slot-selector { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .slot-selector button { width: auto; background: #2a2f45; color: #ffd966; padding: 10px 28px; }
        .slot-selector button.active { background: #f0a500; color: #1a1f2e; box-shadow: 0 0 12px #ffb347; }
        .game-container { background: #0b0f1cbb; border-radius: 48px; padding: 20px; backdrop-filter: blur(4px); border: 1px solid #f0b90b33; }
        .reels { display: flex; justify-content: center; gap: 12px; background: #010314; border-radius: 32px; padding: 25px; flex-wrap: wrap; }
        .reel { background: #0f1428; border-radius: 20px; padding: 10px; width: 90px; text-align: center; box-shadow: inset 0 0 5px #000, 0 5px 10px rgba(0,0,0,0.3); }
        .reel div { font-size: 3.2rem; margin: 8px 0; background: #1e253f; border-radius: 16px; padding: 12px 0; transition: 0.1s; }
        .spin-area { margin-top: 30px; text-align: center; }
        .spin-main { width: 220px; font-size: 1.8rem; background: radial-gradient(circle, #f0a500, #b36200); color: white; text-shadow: 0 0 4px black; }
        .bet-panel { display: flex; justify-content: center; gap: 20px; margin: 20px 0; align-items: center; flex-wrap: wrap; }
        .bet-panel input { width: 140px; text-align: center; padding: 10px; border-radius: 40px; background: #1e253f; border: none; color: white; font-size: 1.2rem; }
        .info-panel { display: flex; justify-content: space-between; margin-top: 20px; background: #00000055; border-radius: 40px; padding: 12px 20px; }
        .win-animation { font-size: 1.8rem; font-weight: bold; color: #ffd966; text-shadow: 0 0 6px orange; }
        .admin-panel { background: #0b0f1c; margin-top: 40px; border-radius: 32px; padding: 20px; border: 1px solid #ffa50055; display: none; }
        .admin-panel h3 { color: #ffaa33; }
        .admin-row { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; align-items: center; }
        .admin-row input, .admin-row select { background: #1e253f; border: none; padding: 10px; border-radius: 28px; color: white; }
        .admin-row button { width: auto; background: #5a3e1f; }
        .logout-btn { background: #4a2a2a; margin-top: 0; width: auto; padding: 6px 18px; }
        @media (max-width: 700px) { .reel { width: 55px; } .reel div { font-size: 1.8rem; padding: 6px 0; } .reels { gap: 6px; } }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="authSection" class="auth-box">
        <h2>🎰 JOY SLOTS DELUXE 🎰</h2>
        <div id="loginForm">
            <div class="input-group"><input type="text" id="loginUser" placeholder="Username" autocomplete="off"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="Password"></div>
            <button id="doLoginBtn">🔐 MASUK</button>
            <div class="switch-text" id="toRegisterBtn">Belum punya akun? Daftar</div>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="input-group"><input type="text" id="regUser" placeholder="Username baru"></div>
            <div class="input-group"><input type="password" id="regPass" placeholder="Password"></div>
            <button id="doRegisterBtn">📝 DAFTAR</button>
            <div class="switch-text" id="toLoginBtn">Sudah punya akun? Login</div>
        </div>
    </div>
    <div id="dashboard" class="dashboard">
        <div class="header">
            <span>👤 <span id="displayUser">-</span> <span id="adminFlagSpan"></span></span>
            <span class="balance">💰 <span id="userBalance">0</span> Koin</span>
            <button class="logout-btn" id="logoutBtn">🚪 Keluar</button>
        </div>
        <div class="slot-selector" id="slotSelector"></div>
        <div class="game-container">
            <div class="reels" id="reelsContainer"></div>
            <div class="bet-panel">
                <span>💰 Taruhan:</span>
                <input type="number" id="betAmount" value="100" step="50" min="10">
                <button id="spinButton" class="spin-main">🎰 SPIN 🎰</button>
            </div>
            <div class="info-panel">
                <span>🎲 Hasil: <span id="lastResult">Tekan spin</span></span>
                <span>🏆 Win Terakhir: <span id="lastWinAmount">0</span> Koin</span>
            </div>
            <div id="winAnimation" class="win-animation" style="text-align:center; min-height:55px;"></div>
        </div>
        <div id="adminPanel" class="admin-panel">
            <h3>⚙️ PANEL ADMIN (SET GLOBAL)</h3>
            <div class="admin-row"><label>RTP (%) :</label><input type="number" id="adminRTP" step="1" min="0" max="100" value="72"><button id="setRTPBtn">Set RTP</button></div>
            <div class="admin-row"><label>Max Multiplier :</label><input type="number" id="adminMaxMult" step="1" min="1" max="1000" value="250"><button id="setMaxMultBtn">Set Max X</button></div>
            <div class="admin-row"><label>Freq Spin (1=ringan):</label><input type="number" id="adminFreq" step="1" min="1" max="20" value="5"><button id="setFreqBtn">Set Frekuensi Bonus</button></div>
            <div class="admin-row"><label>User target :</label><input type="text" id="adminTargetUser"><label>Saldo :</label><input type="number" id="adminSetBalance" value="5000"><button id="adminSetBalanceBtn">Ganti Saldo</button></div>
            <small style="color:#aaa">RTP mempengaruhi peluang menang, Max multiplier batas maksimal kemenangan.</small>
        </div>
    </div>
</div>
<script>
// ========== BAGIAN 1 SELESAI ==========
// ========== BAGIAN 2 MULAI ==========
let currentUser = null;
let isAdmin = false;
let activeSlotId = "majong";
const slotsDB = {
    majong: { name: "🐉 SUPER MAHJONG", reels:5, rows:3, symbols:["🀄","🀆","🀅","🀙","🀚","🀛","🀜","🀝","🀞","🀟","🀠","🀡","🀢","🀣","🀤","🀥","🀦","🀧","🀨","🀩","🀪","🌟"], wild:"🌟", scatter:"🀄" },
    zeus: { name: "⚡ ZEUS OLYMPUS", reels:5, rows:3, symbols:["⚡","🏛️","🦅","🔱","🌩️","💨","🏺","🍇","🌟","🐍","🛡️","🔥","💎","🎲","👑"], wild:"🌟", scatter:"⚡" },
    starlight: { name: "✨ STARLIGHT 1000", reels:5, rows:3, symbols:["⭐","🌙","💫","✨","🌟","🔮","🪄","💎","🎆","🌠","🕯️","📿"], wild:"✨", scatter:"⭐" }
};
let gameState = { rtp:72, maxMult:250, bonusFreq:5 }; // bonusFreq = peluang fitur free spin
let usersDB = JSON.parse(localStorage.getItem("joy_slots_users_deluxe")) || [];
function saveUsers() { localStorage.setItem("joy_slots_users_deluxe", JSON.stringify(usersDB)); }
const ADMIN_USER = "joy1";
const ADMIN_PW = "joyyy2121#";
function initDefault() {
    if (!usersDB.find(u=>u.username===ADMIN_USER)) usersDB.push({ username: ADMIN_USER, password: ADMIN_PW, balance: 999999, isAdmin: true });
    if (!usersDB.find(u=>u.username==="demo")) usersDB.push({ username:"demo", password:"demo123", balance:5000, isAdmin:false });
    saveUsers();
}
initDefault();
function getUser(username) { return usersDB.find(x=>x.username===username); }
function updateBalance(username, newBal) { let u=getUser(username); if(u){ u.balance=Math.max(0,newBal); saveUsers(); } }

// Mekanisme slot modern (RTP, multiplier liar, fitur free spins)
function spinReels(slotId, bet, username) {
    let slot = slotsDB[slotId];
    if(!slot) return {win:0, newBal:0, msg:"error", freeSpinTrigger:false};
    let user = getUser(username);
    if(!user || user.balance < bet) return {win:0, newBal:user?.balance||0, msg:"Saldo kurang", freeSpinTrigger:false};
    let rtp = gameState.rtp / 100;
    let maxMult = gameState.maxMult;
    let isBonusRound = Math.random() * 100 < gameState.bonusFreq;
    let winMult = 0;
    let winAmount = 0;
    let freeSpinAward = 0;
    let roll = Math.random();
    if(roll < rtp * 0.7) { // menang kecil sampai sedang
        winMult = Math.floor(Math.random() * (maxMult * 0.3)) + 1;
    } else if(roll < rtp * 0.9) {
        winMult = Math.floor(Math.random() * (maxMult * 0.6)) + maxMult * 0.2;
    } else if(roll <= rtp + 0.05) {
        winMult = Math.floor(Math.random() * (maxMult - maxMult*0.7 + 1)) + maxMult*0.7;
    } else { winMult = 0; }
    if(winMult > maxMult) winMult = maxMult;
    winAmount = Math.floor(bet * winMult);
    if(isBonusRound && winMult > 2) {
        freeSpinAward = Math.floor(Math.random() * 15) + 5;
        winAmount += bet * 2;
    }
    let newBalance = user.balance - bet + winAmount;
    updateBalance(username, newBalance);
    let msg = winAmount>0 ? `MENANG ${winAmount} (${winMult}x)` : "KALAH";
    if(freeSpinAward>0) msg += ` + BONUS ${freeSpinAward} FREE SPIN!`;
    // generate visual reel array untuk animasi
    let reelsResult = [];
    for(let i=0; i<slot.reels*slot.rows; i++) {
        let randSym = slot.symbols[Math.floor(Math.random()*slot.symbols.length)];
        reelsResult.push(randSym);
    }
    return {win:winAmount, newBal:newBalance, msg:msg, freeSpinTrigger:freeSpinAward>0, freeSpins:freeSpinAward, reels:reelsResult, winMult:winMult};
}

function renderReelsUI(slotId, reelsArray=null) {
    let slot = slotsDB[slotId];
    if(!slot) return;
    let container = document.getElementById("reelsContainer");
    if(!container) return;
    if(reelsArray && reelsArray.length === slot.reels*slot.rows) {
        container.innerHTML = "";
        for(let r=0; r<slot.reels; r++) {
            let reelDiv = document.createElement("div");
            reelDiv.className = "reel";
            for(let row=0; row<slot.rows; row++) {
                let idx = r * slot.rows + row;
                let sym = reelsArray[idx];
                let cell = document.createElement("div");
                cell.innerText = sym;
                reelDiv.appendChild(cell);
            }
            container.appendChild(reelDiv);
        }
    } else {
        container.innerHTML = "";
        for(let i=0; i<slot.reels; i++) {
            let reelDiv = document.createElement("div");
            reelDiv.className = "reel";
            for(let j=0; j<slot.rows; j++) {
                let cell = document.createElement("div");
                cell.innerText = "?";
                reelDiv.appendChild(cell);
            }
            container.appendChild(reelDiv);
        }
    }
}

function loadSlotGame(slotId) {
    activeSlotId = slotId;
    renderReelsUI(slotId);
    document.querySelectorAll(".slot-selector button").forEach(btn=>{
        if(btn.getAttribute("data-slot")===slotId) btn.classList.add("active");
        else btn.classList.remove("active");
    });
}

document.getElementById("spinButton").onclick = () => {
    if(!currentUser) { alert("Login dulu!"); return; }
    let bet = parseInt(document.getElementById("betAmount").value);
    if(isNaN(bet) || bet<10) bet=10;
    let user = getUser(currentUser);
    if(user.balance < bet) { alert("Saldo tidak cukup!"); return; }
    let result = spinReels(activeSlotId, bet, currentUser);
    renderReelsUI(activeSlotId, result.reels || null);
    document.getElementById("lastResult").innerText = result.msg;
    document.getElementById("lastWinAmount").innerText = result.win;
    document.getElementById("userBalance").innerText = getUser(currentUser).balance;
    let animDiv = document.getElementById("winAnimation");
    if(result.win > 0) {
        animDiv.innerHTML = `✨🎉 +${result.win} KOIN! ${result.freeSpinTrigger ? '🔥 FREE SPIN AKTIF 🔥' : ''} 🎉✨`;
        setTimeout(()=>{ if(animDiv) animDiv.innerHTML = ""; }, 1800);
    } else {
        animDiv.innerHTML = "😞 Coba lagi!";
        setTimeout(()=>{ if(animDiv) animDiv.innerHTML = ""; }, 1000);
    }
    if(result.freeSpinTrigger && result.freeSpins) {
        setTimeout(()=>{ alert(`🎰 FREE SPIN ${result.freeSpins} KALI DIBERIKAN! ( simulasi otomatis )`); }, 500);
    }
};

function renderSlotSelector() {
    let selector = document.getElementById("slotSelector");
    if(!selector) return;
    selector.innerHTML = "";
    for(let [id, val] of Object.entries(slotsDB)) {
        let btn = document.createElement("button");
        btn.innerText = val.name;
        btn.setAttribute("data-slot", id);
        btn.onclick = () => loadSlotGame(id);
        selector.appendChild(btn);
    }
    loadSlotGame("majong");
}

function refreshUI() {
    if(!currentUser) return;
    let user = getUser(currentUser);
    if(user) {
        document.getElementById("userBalance").innerText = user.balance;
        document.getElementById("displayUser").innerText = currentUser + (user.isAdmin ? " [ADMIN]" : "");
        if(user.isAdmin) {
            document.getElementById("adminFlagSpan").innerHTML = '<span class="admin-badge">ADMIN</span>';
            document.getElementById("adminPanel").style.display = "block";
            isAdmin=true;
        } else {
            document.getElementById("adminFlagSpan").innerHTML = '';
            document.getElementById("adminPanel").style.display = "none";
            isAdmin=false;
        }
    }
}
// Admin handlers
document.getElementById("setRTPBtn")?.addEventListener("click",()=>{
    let val = parseInt(document.getElementById("adminRTP").value);
    if(!isNaN(val)) gameState.rtp = Math.min(100,Math.max(0,val));
    alert(`RTP sekarang ${gameState.rtp}%`);
});
document.getElementById("setMaxMultBtn")?.addEventListener("click",()=>{
    let val = parseInt(document.getElementById("adminMaxMult").value);
    if(!isNaN(val)) gameState.maxMult = Math.min(1000,Math.max(1,val));
    alert(`Max multiplier = ${gameState.maxMult}x`);
});
document.getElementById("setFreqBtn")?.addEventListener("click",()=>{
    let val = parseInt(document.getElementById("adminFreq").value);
    if(!isNaN(val)) gameState.bonusFreq = Math.min(20,Math.max(0,val));
    alert(`Frekuensi bonus (semakin kecil makin sering) = ${gameState.bonusFreq}%`);
});
document.getElementById("adminSetBalanceBtn")?.addEventListener("click",()=>{
    let target = document.getElementById("adminTargetUser").value;
    let bal = parseInt(document.getElementById("adminSetBalance").value);
    if(target && !isNaN(bal)) {
        let u = usersDB.find(x=>x.username===target);
        if(u) { u.balance = Math.max(0,bal); saveUsers(); if(currentUser===target) refreshUI(); alert(`Saldo ${target} = ${bal}`); }
        else alert("User tidak ada");
    }
});
// AUTH
document.getElementById("doLoginBtn").onclick = () => {
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value;
    let user = usersDB.find(x=>x.username===u && x.password===p);
    if(user) {
        currentUser = u;
        document.getElementById("authSection").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        renderSlotSelector();
        refreshUI();
    } else alert("User atau password salah!");
};
document.getElementById("logoutBtn").onclick = () => {
    currentUser = null;
    document.getElementById("authSection").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
};
document.getElementById("toRegisterBtn").onclick = () => { document.getElementById("loginForm").style.display="none"; document.getElementById("registerForm").style.display="block"; };
document.getElementById("toLoginBtn").onclick = () => { document.getElementById("loginForm").style.display="block"; document.getElementById("registerForm").style.display="none"; };
document.getElementById("doRegisterBtn").onclick = () => {
    let newU = document.getElementById("regUser").value.trim();
    let newP = document.getElementById("regPass").value;
    if(!newU || !newP) { alert("Isi semua!"); return; }
    if(usersDB.find(x=>x.username===newU)) { alert("Username sudah ada"); return; }
    usersDB.push({ username: newU, password: newP, balance: 2000, isAdmin: false });
    saveUsers();
    alert("Registrasi berhasil! Silakan login.");
    document.getElementById("loginForm").style.display="block";
    document.getElementById("registerForm").style.display="none";
};
</script>
</body>
</html>
